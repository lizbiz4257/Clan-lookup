<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clan Lookup</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --bg: #f7f8fa;
      --card: #ffffff;
      --border: #e3e6eb;
      --text: #1a1d23;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px 60px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    input {
      width: 100%; padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; margin-bottom: 10px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    button.secondary {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    button:active { opacity: 0.85; }
    button:disabled { background: #b9c2d0; color: #fff; cursor: not-allowed; border: none; }
    #status { font-size: 13px; margin-top: 8px; min-height: 16px; }
    #status.ok { color: #15803d; }
    #status.err { color: #b91c1c; }
    #status.busy { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
    th { text-align: left; padding: 6px 4px; color: var(--muted); white-space: nowrap; }
    td { padding: 6px 4px; border-top: 1px solid var(--border); white-space: nowrap; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #cbd5e1; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: -2px; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Clan Lookup</h1>
    <p class="sub">Search one clan by tag, or pull everyone across all your family clans at once.</p>

    <div class="card">
      <input id="clanTagInput" type="text" placeholder="#XXXXXXX">
      <button onclick="lookupClan()">Look up this clan</button>
      <button class="secondary" onclick="lookupFamily()">Search all family clans</button>
      <div id="status"></div>
    </div>

    <div id="results"></div>
  </div>

  <script>
    // Your 7 family clan tags
    const FAMILY_TAGS = [
      '#YQJPR2V9', '#L0PQ2ULQ', '#YRVC9QVJ', '#G9LRRP82',
      '#GURCRRY9', '#QJU8P80C', '#GY0QQGYY'
    ];

    let lastData = null;

    async function lookupClan() {
      const tag = document.getElementById('clanTagInput').value.trim();
      if (!tag) return;
      await runLookup([tag]);
    }

    async function lookupFamily() {
      await runLookup(FAMILY_TAGS);
    }

    async function runLookup(tags) {
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');
      const allButtons = document.querySelectorAll('button');
      allButtons.forEach(b => b.disabled = true);
      resultsEl.innerHTML = '';
      statusEl.className = 'busy';
      statusEl.innerHTML = '<span class="spinner"></span>Looking up…';

      try {
        const resp = await fetch('/api/lookup?tags=' + encodeURIComponent(tags.join(',')));
        const data = await resp.json();
        allButtons.forEach(b => b.disabled = false);

        if (!resp.ok || data.error) {
          statusEl.className = 'err';
          statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
          return;
        }

        lastData = data;
        let statusText = data.clans.map(c => c.clanName + ' (' + c.memberCount + ')').join(', ') +
          ' — ' + data.totalMembers + ' total members';
        if (data.failedClans && data.failedClans.length) {
          statusText += '. Failed: ' + data.failedClans.map(f => f.clanTag).join(', ');
        }
        statusEl.className = 'ok';
        statusEl.textContent = statusText;
        renderTable(data);
      } catch (err) {
        allButtons.forEach(b => b.disabled = false);
        statusEl.className = 'err';
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    function renderTable(data) {
      const resultsEl = document.getElementById('results');
      const multiClan = data.clans.length > 1;

      let html = '<div class="card"><div style="overflow-x:auto;"><table>';
      html += '<tr><th>Name</th>' + (multiClan ? '<th>Clan</th>' : '') +
        '<th>Live Atk</th><th>Live Score</th>' +
        '<th>Wk1 Atk</th><th>Wk1 Score</th>' +
        '<th>Wk2 Atk</th><th>Wk2 Score</th>' +
        '<th>Wk3 Atk</th><th>Wk3 Score</th>' +
        '<th>Wk4 Atk</th><th>Wk4 Score</th>' +
        '<th>5wk Avg Atk</th><th>5wk Avg Score</th></tr>';

      data.rows.forEach((r) => {
        const w = r.weeks || [];
        html += '<tr>' +
          '<td>' + r.name + '</td>' +
          (multiClan ? '<td>' + r.clanName + '</td>' : '') +
          '<td>' + (r.thisWeekAttacks == null ? '–' : r.thisWeekAttacks) + '</td>' +
          '<td>' + (r.thisWeekScore == null ? '–' : r.thisWeekScore) + '</td>';
        for (let i = 0; i < 4; i++) {
          const wk = w[i];
          html += '<td>' + (wk ? wk.attacks : '–') + '</td>' +
                  '<td>' + (wk ? wk.score : '–') + '</td>';
        }
        html += '<td>' + (r.fiveWeekAvgAttacks == null ? '–' : r.fiveWeekAvgAttacks) + '</td>' +
          '<td>' + (r.fiveWeekAvgScore == null ? '–' : r.fiveWeekAvgScore) + '</td>' +
          '</tr>';
      });
      html += '</table></div>';
      html += '<button style="margin-top:12px;" onclick="downloadExcel()">Download to Excel</button>';
      html += '</div>';
      resultsEl.innerHTML = html;
    }

    function downloadExcel() {
      if (!lastData) return;
      const multiClan = lastData.clans.length > 1;

      const headers = ['Name'];
      if (multiClan) headers.push('Clan');
      headers.push(
        'Live Attacks', 'Live Score',
        'Week 1 Attacks', 'Week 1 Score',
        'Week 2 Attacks', 'Week 2 Score',
        'Week 3 Attacks', 'Week 3 Score',
        'Week 4 Attacks', 'Week 4 Score',
        '5-Week Avg Attacks', '5-Week Avg Score'
      );

      const data = lastData.rows.map((r) => {
        const w = r.weeks || [];
        const row = [r.name];
        if (multiClan) row.push(r.clanName);
        row.push(
          r.thisWeekAttacks, r.thisWeekScore,
          w[0] ? w[0].attacks : null, w[0] ? w[0].score : null,
          w[1] ? w[1].attacks : null, w[1] ? w[1].score : null,
          w[2] ? w[2].attacks : null, w[2] ? w[2].score : null,
          w[3] ? w[3].attacks : null, w[3] ? w[3].score : null,
          r.fiveWeekAvgAttacks, r.fiveWeekAvgScore
        );
        return row;
      });

      const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Clan Data');
      const filename = multiClan ? 'clan-family-lookup.xlsx' : (lastData.clans[0].clanName.replace(/[^a-z0-9]/gi, '_') + '.xlsx');
      XLSX.writeFile(wb, filename);
    }

    document.getElementById('clanTagInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') lookupClan();
    });
  </script>
</body>
</html>
