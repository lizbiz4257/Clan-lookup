
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clan Lookup</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --bg: #f7f8fa;
      --card: #ffffff;
      --border: #e3e6eb;
      --text: #1a1d23;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px 60px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    input {
      width: 100%; padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; margin-bottom: 10px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    button.secondary {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    button:active { opacity: 0.85; }
    button:disabled { background: #b9c2d0; color: #fff; cursor: not-allowed; border: none; }
    #status { font-size: 13px; margin-top: 8px; min-height: 16px; }
    #status.ok { color: #15803d; }
    #status.err { color: #b91c1c; }
    #status.busy { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
    th { text-align: left; padding: 6px 4px; color: var(--muted); white-space: nowrap; }
    td { padding: 6px 4px; border-top: 1px solid var(--border); white-space: nowrap; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #cbd5e1; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: -2px; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Clan Lookup</h1>
    <p class="sub">Search one clan by tag, or pull everyone across all your family clans at once.</p>

    <div class="card">
      <input id="clanTagInput" type="text" placeholder="#XXXXXXX">
      <button onclick="lookupClan()">Look up this clan</button>
      <button class="secondary" onclick="lookupFamily()">Search all family clans</button>
      <div id="clanStatus" style="font-size:13px; margin-top:8px; min-height:16px;"></div>
    </div>

    <div class="card">
      <input id="playerInput" type="text" placeholder="Player name or #tag">
      <button onclick="lookupPlayer()">Look up player</button>
      <div id="playerStatus" style="font-size:13px; margin-top:8px; min-height:16px;"></div>
    </div>

    <button class="secondary" onclick="searchBoth()" style="max-width:720px; margin: -6px auto 4px; display:block;">Find this player, only within the clan above</button>
    <p style="text-align:center; color:var(--muted); font-size:12px; margin:0 0 14px;">Uses whatever's in the clan box to narrow the player search</p>

    <div id="clanResults"></div>
    <div id="newMembersResults"></div>
    <div id="playerResults"></div>
  </div>

  <script>
    // Your 9 family clan tags
    const FAMILY_TAGS = [
      '#YQJPR2V9', '#L0PQ2ULQ', '#YRVC9QVJ', '#G9LRRP82',
      '#GURCRRY9', '#QJU8P80C', '#GY0QQGYY',
      '#QVY92JLV', '#GQ20UQR8'
    ];

    // !Baked! 2.5 (#G9LRRP82) and Dudes Reunited (#L0PQ2ULQ) are paused —
    // still fully searchable individually by tag, just excluded from the
    // bulk "Search all family clans" button.
    const ACTIVE_FAMILY_TAGS = FAMILY_TAGS.filter(
      (t) => t !== '#G9LRRP82' && t !== '#L0PQ2ULQ'
    );

    let lastClanData = null;
    let lastPlayerData = null;

    async function lookupClan() {
      const tag = document.getElementById('clanTagInput').value.trim();
      if (!tag) return;
      await runLookup([tag]);
    }

    async function lookupFamily() {
      await runLookup(ACTIVE_FAMILY_TAGS);
    }

    async function lookupPlayer() {
      const query = document.getElementById('playerInput').value.trim();
      if (!query) return;
      await runPlayerLookup(query);
    }

    async function searchBoth() {
      const clanTag = document.getElementById('clanTagInput').value.trim();
      const playerQuery = document.getElementById('playerInput').value.trim();
      if (!playerQuery) return;
      await runPlayerLookup(playerQuery, clanTag);
    }

    async function runPlayerLookup(query, clanScope) {
      const statusEl = document.getElementById('playerStatus');
      const resultsEl = document.getElementById('playerResults');
      const allButtons = document.querySelectorAll('button');
      allButtons.forEach(b => b.disabled = true);
      resultsEl.innerHTML = '';
      statusEl.className = 'busy';
      statusEl.innerHTML = '<span class="spinner"></span>Looking up…';

      try {
        let url = '/api/lookup?player=' + encodeURIComponent(query);
        if (clanScope) url += '&tags=' + encodeURIComponent(clanScope);
        const resp = await fetch(url);
        const data = await resp.json();
        allButtons.forEach(b => b.disabled = false);

        if (!resp.ok || data.error) {
          statusEl.className = 'err';
          statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
          return;
        }
        if (data.notFound) {
          statusEl.className = 'err';
          statusEl.textContent = 'No player found with that tag.';
          return;
        }
        if (data.noClanNameMatch) {
          statusEl.className = 'err';
          statusEl.textContent = 'No clan matched "' + clanScope + '".';
          return;
        }
        if (data.rows.length === 0) {
          statusEl.className = 'err';
          statusEl.textContent = 'No matches found for "' + query + '"' + (clanScope ? ' in "' + clanScope + '"' : ' in your family clans') + '.';
          return;
        }

        lastPlayerData = data;
        statusEl.className = 'ok';
        statusEl.textContent = data.rows.length + ' match' + (data.rows.length > 1 ? 'es' : '') + ' found' + (clanScope ? ' in ' + clanScope : '');
        renderTable(data, resultsEl, 'lastPlayerData');
      } catch (err) {
        allButtons.forEach(b => b.disabled = false);
        statusEl.className = 'err';
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    async function runLookup(tags) {
      const statusEl = document.getElementById('clanStatus');
      const resultsEl = document.getElementById('clanResults');
      const allButtons = document.querySelectorAll('button');
      allButtons.forEach(b => b.disabled = true);
      resultsEl.innerHTML = '';
      statusEl.className = 'busy';
      statusEl.innerHTML = '<span class="spinner"></span>Looking up…';

      try {
        const resp = await fetch('/api/lookup?tags=' + encodeURIComponent(tags.join(',')));
        const data = await resp.json();
        allButtons.forEach(b => b.disabled = false);

        if (!resp.ok || data.error) {
          statusEl.className = 'err';
          statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
          return;
        }

        lastClanData = data;
        let statusText = data.clans.map(c => c.clanName + ' (' + c.memberCount + ')').join(', ') +
          ' — ' + data.totalMembers + ' total members';
        if (data.failedClans && data.failedClans.length) {
          statusText += '. Failed: ' + data.failedClans.map(f => f.clanTag).join(', ');
        }
        statusEl.className = 'ok';
        statusEl.textContent = statusText;
        renderTable(data, resultsEl, 'lastClanData');
        renderNewMembersButton();
      } catch (err) {
        allButtons.forEach(b => b.disabled = false);
        statusEl.className = 'err';
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    function renderNewMembersButton() {
      const el = document.getElementById('newMembersResults');
      const newCount = (lastClanData.rows || []).filter(r => r.isNew).length;
      if (newCount === 0) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = '<button class="secondary" onclick="showNewMembersOnly()">Show new members only (' + newCount + ')</button>';
    }

    function showNewMembersOnly() {
      const el = document.getElementById('newMembersResults');
      const newRows = (lastClanData.rows || []).filter(r => r.isNew);

      let html = '<div class="card"><h2 style="font-size:14px; margin:0 0 4px;">New Members (' + newRows.length + ')</h2>';
      html += '<p style="color:var(--muted); font-size:12px; margin:0 0 10px;">5-week history shown automatically if they came from another family clan. Blank "Prior Clan" means they joined from outside the family — check that clan directly by tag if you know it.</p>';
      html += '<div style="overflow-x:auto;"><table>';
      html += '<tr><th>Name</th><th>Tag</th><th>Clan</th><th>Prior Clan</th>' +
        '<th>Wk1 Score</th><th>Wk1 Atk</th><th>Wk2 Score</th><th>Wk2 Atk</th>' +
        '<th>Wk3 Score</th><th>Wk3 Atk</th><th>Wk4 Score</th><th>Wk4 Atk</th>' +
        '<th>Wk5 Score</th><th>Wk5 Atk</th>' +
        '<th>Prior Avg Score</th><th>Prior Avg Attacks</th><th>Weeks Tracked</th></tr>';
      newRows.forEach((r) => {
        const w = r.priorWeeks || [];
        html += '<tr>' +
          '<td>' + r.name + '</td>' +
          '<td>' + r.tag + '</td>' +
          '<td>' + (r.clanName || '–') + '</td>' +
          '<td>' + (r.priorClanName || '– (outside family)') + '</td>';
        for (let i = 0; i < 5; i++) {
          const wk = w[i];
          html += '<td>' + (wk ? wk.score : '–') + '</td>' + '<td>' + (wk ? wk.attacks : '–') + '</td>';
        }
        html += '<td>' + (r.priorAvgScore == null ? '–' : r.priorAvgScore) + '</td>' +
          '<td>' + (r.priorAvgAttacks == null ? '–' : r.priorAvgAttacks) + '</td>' +
          '<td>' + (r.priorWeeksTracked == null ? '–' : r.priorWeeksTracked) + '</td>' +
          '</tr>';
      });
      html += '</table></div></div>';
      el.innerHTML = html;
    }

    function renderTable(data, resultsEl, dataVarName) {
      let html = '<div class="card"><div style="overflow-x:auto;"><table>';
      html += '<tr><th>Name</th><th>Tag</th><th>Clan</th><th>In Clan</th><th>New?</th>' +
        '<th>Score This Week</th><th>Cards Played</th>' +
        '<th>Wk1 Score</th><th>Wk1 Atk</th><th>Wk2 Score</th><th>Wk2 Atk</th>' +
        '<th>Wk3 Score</th><th>Wk3 Atk</th><th>Wk4 Score</th><th>Wk4 Atk</th>' +
        '<th>Wk5 Score</th><th>Wk5 Atk</th>' +
        '<th>Total 5k</th><th>Elo</th><th>5wa</th>' +
        '<th>5kP</th><th>5kG</th><th>5kPPG</th>' +
        '<th>Prior Clan</th><th>Prior Avg Score</th><th>Prior Avg Attacks</th>' +
        '</tr>';

      data.rows.forEach((r) => {
        const w = r.weeks || [];
        html += '<tr>' +
          '<td>' + r.name + '</td>' +
          '<td>' + r.tag + '</td>' +
          '<td>' + (r.clanName || '–') + '</td>' +
          '<td>' + r.inClan + '</td>' +
          '<td>' + (r.isNew ? 'Yes' : '–') + '</td>' +
          '<td>' + (r.thisWeekScore == null ? '–' : r.thisWeekScore) + '</td>' +
          '<td>' + (r.thisWeekAttacks == null ? '–' : r.thisWeekAttacks) + '</td>';
        for (let i = 0; i < 5; i++) {
          const wk = w[i];
          const l2wMark = wk && wk.isL2W ? ' (L2W)' : '';
          html += '<td>' + (wk ? wk.score + l2wMark : '–') + '</td>' + '<td>' + (wk ? wk.attacks : '–') + '</td>';
        }
        html += '<td>' + (r.total5k == null ? '–' : r.total5k) + '</td>' +
          '<td>' + (r.elo == null ? '–' : r.elo) + '</td>' +
          '<td>' + (r.fivewa == null ? '–' : r.fivewa) + '</td>' +
          '<td>' + (r.fiveKP == null ? '–' : r.fiveKP) + '</td>' +
          '<td>' + (r.fiveKG == null ? '–' : r.fiveKG) + '</td>' +
          '<td>' + (r.fiveKPPG == null ? '–' : r.fiveKPPG) + '</td>' +
          '<td>' + (r.priorClanName || '–') + '</td>' +
          '<td>' + (r.priorAvgScore == null ? '–' : r.priorAvgScore) + '</td>' +
          '<td>' + (r.priorAvgAttacks == null ? '–' : r.priorAvgAttacks) + '</td>' +
          '</tr>';
      });
      html += '</table></div>';
      html += '<button style="margin-top:12px;" onclick="downloadExcel(' + dataVarName + ')">Download to Excel</button>';
      html += '<button class="secondary" style="margin-top:8px;" onclick="showSheetsFormula(' + dataVarName + ')">Get Google Sheets formula</button>';
      html += '<div id="sheetsFormula-' + dataVarName + '" style="margin-top:8px;"></div>';
      html += '</div>';
      resultsEl.innerHTML = html;
    }

    function showSheetsFormula(data) {
      const params = new URLSearchParams(window.location.search);
      let url = window.location.origin + '/api/export-csv?';
      if (data.clans && data.clans.length) {
        url += 'tags=' + encodeURIComponent(data.clans.map(c => c.clanTag).join(','));
      } else {
        url = window.location.origin + '/api/export-csv?player=' + encodeURIComponent(document.getElementById('playerInput').value.trim());
      }
      const formula = '=IMPORTDATA("' + url + '")';
      const varName = data === lastClanData ? 'lastClanData' : 'lastPlayerData';
      const el = document.getElementById('sheetsFormula-' + varName);
      el.innerHTML = '<div class="card" style="background:#f0f7ff;"><p style="font-size:12px; margin:0 0 8px;">Paste this into any cell in Google Sheets — it pulls live data automatically:</p>' +
        '<textarea readonly style="width:100%; height:60px; font-family:monospace; font-size:11px; padding:8px; border:1px solid var(--border); border-radius:6px;">' + formula + '</textarea></div>';
    }

    function downloadExcel(data) {
      if (!data) return;
      const multiClan = data.clans.length > 1;

      const headers = ['Name', 'Tag', 'Clan', 'In Clan', 'New?', 'Score This Week', 'Cards Played',
        'Week 1 Score', 'Week 1 Attacks', 'Week 2 Score', 'Week 2 Attacks',
        'Week 3 Score', 'Week 3 Attacks', 'Week 4 Score', 'Week 4 Attacks',
        'Week 5 Score', 'Week 5 Attacks',
        'Total 5k', 'Elo', '5wa', '5kP', '5kG', '5kPPG', 'Prior Clan', 'Prior Avg Score', 'Prior Avg Attacks'];

      const rows = data.rows.map((r) => {
        const w = r.weeks || [];
        const row = [r.name, r.tag, r.clanName || '', r.inClan, r.isNew ? 'Yes' : '', r.thisWeekScore, r.thisWeekAttacks];
        for (let i = 0; i < 5; i++) {
          const wk = w[i];
          row.push(wk ? (wk.score + (wk.isL2W ? ' (L2W)' : '')) : null, wk ? wk.attacks : null);
        }
        row.push(r.total5k, r.elo, r.fivewa, r.fiveKP, r.fiveKG, r.fiveKPPG, r.priorClanName || '', r.priorAvgScore, r.priorAvgAttacks);
        return row;
      });

      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Clan Data');
      const filename = multiClan ? 'clan-family-lookup.xlsx' : (data.clans[0] ? data.clans[0].clanName.replace(/[^a-z0-9]/gi, '_') + '.xlsx' : 'player-lookup.xlsx');
      XLSX.writeFile(wb, filename);
    }

    document.getElementById('clanTagInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') lookupClan();
    });
    document.getElementById('playerInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') lookupPlayer();
    });
  </script>
</body>
</html>
