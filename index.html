<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clan Lookup</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --bg: #f7f8fa;
      --card: #ffffff;
      --border: #e3e6eb;
      --text: #1a1d23;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px 60px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    input {
      width: 100%; padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; margin-bottom: 10px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    button.secondary {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    button:active { opacity: 0.85; }
    button:disabled { background: #b9c2d0; color: #fff; cursor: not-allowed; border: none; }
    #status { font-size: 13px; margin-top: 8px; min-height: 16px; }
    #status.ok { color: #15803d; }
    #status.err { color: #b91c1c; }
    #status.busy { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
    th { text-align: left; padding: 6px 4px; color: var(--muted); white-space: nowrap; }
    td { padding: 6px 4px; border-top: 1px solid var(--border); white-space: nowrap; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #cbd5e1; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: -2px; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Clan Lookup</h1>
    <p class="sub">Search one clan by tag, or pull everyone across all your family clans at once.</p>

    <div class="card">
      <input id="clanTagInput" type="text" placeholder="#XXXXXXX">
      <button onclick="lookupClan()">Look up this clan</button>
      <button class="secondary" onclick="lookupFamily()">Search all family clans</button>
      <div id="clanStatus" style="font-size:13px; margin-top:8px; min-height:16px;"></div>
    </div>

    <div class="card">
      <input id="playerInput" type="text" placeholder="Player name or #tag">
      <button onclick="lookupPlayer()">Look up player</button>
      <div id="playerStatus" style="font-size:13px; margin-top:8px; min-height:16px;"></div>
    </div>

    <button class="secondary" onclick="searchBoth()" style="max-width:720px; margin: -6px auto 14px; display:block;">Search both at once</button>

    <div id="clanResults"></div>
    <div id="playerResults"></div>
  </div>

  <script>
    // Your 9 family clan tags
    const FAMILY_TAGS = [
      '#YQJPR2V9', '#L0PQ2ULQ', '#YRVC9QVJ', '#G9LRRP82',
      '#GURCRRY9', '#QJU8P80C', '#GY0QQGYY',
      '#QVY92JLV', '#GQ20UQR8'
    ];

    let lastClanData = null;
    let lastPlayerData = null;

    async function lookupClan() {
      const tag = document.getElementById('clanTagInput').value.trim();
      if (!tag) return;
      await runLookup([tag]);
    }

    async function lookupFamily() {
      await runLookup(FAMILY_TAGS);
    }

    async function lookupPlayer() {
      const query = document.getElementById('playerInput').value.trim();
      if (!query) return;
      await runPlayerLookup(query);
    }

    async function searchBoth() {
      const clanTag = document.getElementById('clanTagInput').value.trim();
      const playerQuery = document.getElementById('playerInput').value.trim();
      const tasks = [];
      if (clanTag) tasks.push(runLookup([clanTag]));
      if (playerQuery) tasks.push(runPlayerLookup(playerQuery));
      if (tasks.length === 0) return;
      await Promise.all(tasks);
    }

    async function runPlayerLookup(query) {
      const statusEl = document.getElementById('playerStatus');
      const resultsEl = document.getElementById('playerResults');
      const allButtons = document.querySelectorAll('button');
      allButtons.forEach(b => b.disabled = true);
      resultsEl.innerHTML = '';
      statusEl.className = 'busy';
      statusEl.innerHTML = '<span class="spinner"></span>Looking up…';

      try {
        const resp = await fetch('/api/lookup?player=' + encodeURIComponent(query));
        const data = await resp.json();
        allButtons.forEach(b => b.disabled = false);

        if (!resp.ok || data.error) {
          statusEl.className = 'err';
          statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
          return;
        }
        if (data.notFound) {
          statusEl.className = 'err';
          statusEl.textContent = 'No player found with that tag.';
          return;
        }
        if (data.rows.length === 0) {
          statusEl.className = 'err';
          statusEl.textContent = 'No matches found in your family clans for "' + query + '".';
          return;
        }

        lastPlayerData = data;
        statusEl.className = 'ok';
        statusEl.textContent = data.rows.length + ' match' + (data.rows.length > 1 ? 'es' : '') + ' found';
        renderTable(data, resultsEl, 'lastPlayerData');
      } catch (err) {
        allButtons.forEach(b => b.disabled = false);
        statusEl.className = 'err';
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    async function runLookup(tags) {
      const statusEl = document.getElementById('clanStatus');
      const resultsEl = document.getElementById('clanResults');
      const allButtons = document.querySelectorAll('button');
      allButtons.forEach(b => b.disabled = true);
      resultsEl.innerHTML = '';
      statusEl.className = 'busy';
      statusEl.innerHTML = '<span class="spinner"></span>Looking up…';

      try {
        const resp = await fetch('/api/lookup?tags=' + encodeURIComponent(tags.join(',')));
        const data = await resp.json();
        allButtons.forEach(b => b.disabled = false);

        if (!resp.ok || data.error) {
          statusEl.className = 'err';
          statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
          return;
        }

        lastClanData = data;
        let statusText = data.clans.map(c => c.clanName + ' (' + c.memberCount + ')').join(', ') +
          ' — ' + data.totalMembers + ' total members';
        if (data.failedClans && data.failedClans.length) {
          statusText += '. Failed: ' + data.failedClans.map(f => f.clanTag).join(', ');
        }
        statusEl.className = 'ok';
        statusEl.textContent = statusText;
        renderTable(data, resultsEl, 'lastClanData');
      } catch (err) {
        allButtons.forEach(b => b.disabled = false);
        statusEl.className = 'err';
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    function renderTable(data, resultsEl, dataVarName) {
      let html = '<div class="card"><div style="overflow-x:auto;"><table>';
      html += '<tr><th>Name</th><th>Tag</th><th>Clan</th><th>In Clan</th>' +
        '<th>Score This Week</th><th>Cards Played</th>' +
        '<th>Total 5k</th><th>Elo</th><th>5wa</th>' +
        '<th>5kP</th><th>5kG</th><th>5kPPG</th>' +
        '</tr>';

      data.rows.forEach((r) => {
        html += '<tr>' +
          '<td>' + r.name + '</td>' +
          '<td>' + r.tag + '</td>' +
          '<td>' + (r.clanName || '–') + '</td>' +
          '<td>' + r.inClan + '</td>' +
          '<td>' + (r.thisWeekScore == null ? '–' : r.thisWeekScore) + '</td>' +
          '<td>' + (r.thisWeekAttacks == null ? '–' : r.thisWeekAttacks) + '</td>' +
          '<td>' + (r.total5k == null ? '–' : r.total5k) + '</td>' +
          '<td>' + (r.elo == null ? '–' : r.elo) + '</td>' +
          '<td>' + (r.fivewa == null ? '–' : r.fivewa) + '</td>' +
          '<td>' + (r.fiveKP == null ? '–' : r.fiveKP) + '</td>' +
          '<td>' + (r.fiveKG == null ? '–' : r.fiveKG) + '</td>' +
          '<td>' + (r.fiveKPPG == null ? '–' : r.fiveKPPG) + '</td>' +
          '</tr>';
      });
      html += '</table></div>';
      html += '<button style="margin-top:12px;" onclick="downloadExcel(' + dataVarName + ')">Download to Excel</button>';
      html += '</div>';
      resultsEl.innerHTML = html;
    }

    function downloadExcel(data) {
      if (!data) return;
      const multiClan = data.clans.length > 1;

      const headers = ['Name', 'Tag', 'Clan', 'In Clan', 'Score This Week', 'Cards Played', 'Total 5k', 'Elo', '5wa', '5kP', '5kG', '5kPPG'];

      const rows = data.rows.map((r) => ([
        r.name, r.tag, r.clanName || '', r.inClan, r.thisWeekScore, r.thisWeekAttacks,
        r.total5k, r.elo, r.fivewa, r.fiveKP, r.fiveKG, r.fiveKPPG
      ]));

      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Clan Data');
      const filename = multiClan ? 'clan-family-lookup.xlsx' : (data.clans[0] ? data.clans[0].clanName.replace(/[^a-z0-9]/gi, '_') + '.xlsx' : 'player-lookup.xlsx');
      XLSX.writeFile(wb, filename);
    }

    document.getElementById('clanTagInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') lookupClan();
    });
    document.getElementById('playerInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') lookupPlayer();
    });
  </script>
</body>
</html>
